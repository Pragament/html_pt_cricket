<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🏏 Cricket Scorekeeper</title>
    <style>
        /* ---------- RESET & BASE ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            background: #f0f4f0;
            color: #1a2e1a;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .app {
            max-width: 900px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px;
            padding: 24px 20px 32px;
            box-shadow: 0 12px 40px rgba(0, 30, 0, 0.12);
            transition: 0.2s;
        }

        /* ---------- HEADER ---------- */
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            gap: 10px;
        }
        .header h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: #0f3b0f;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header h1 span {
            font-size: 28px;
        }
        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .header-actions button {
            background: #e8efe8;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            color: #1a3a1a;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header-actions button:hover {
            background: #d0e0d0;
            transform: scale(0.97);
        }
        .header-actions .btn-danger {
            background: #fce8e8;
            color: #a13030;
        }
        .header-actions .btn-danger:hover {
            background: #f8d0d0;
        }
        .header-actions .btn-primary {
            background: #1a5a1a;
            color: #fff;
        }
        .header-actions .btn-primary:hover {
            background: #0f4a0f;
        }

        /* ---------- MATCH SETUP ---------- */
        .setup-panel {
            background: #f8fbf8;
            border-radius: 20px;
            padding: 20px 22px;
            margin-bottom: 20px;
            border: 1px solid #dfe9df;
        }
        .setup-panel h3 {
            font-size: 16px;
            font-weight: 600;
            color: #2a4a2a;
            margin-bottom: 12px;
        }
        .setup-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 18px;
            align-items: flex-end;
        }
        .setup-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1 1 160px;
        }
        .setup-group label {
            font-size: 13px;
            font-weight: 600;
            color: #3a5a3a;
        }
        .setup-group input,
        .setup-group select {
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid #ccdccc;
            background: #fff;
            font-size: 15px;
            outline: none;
            transition: 0.15s;
        }
        .setup-group input:focus,
        .setup-group select:focus {
            border-color: #3a8a3a;
            box-shadow: 0 0 0 3px rgba(58, 138, 58, 0.15);
        }
        .setup-group select {
            cursor: pointer;
        }
        .setup-actions {
            display: flex;
            gap: 10px;
            flex: 1 1 100%;
            margin-top: 6px;
        }
        .setup-actions button {
            padding: 9px 24px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: 0.15s;
            background: #1a5a1a;
            color: #fff;
        }
        .setup-actions button:hover {
            background: #0f4a0f;
            transform: scale(0.97);
        }
        .setup-actions button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        /* ---------- SCOREBOARD ---------- */
        .scoreboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin: 16px 0 18px;
        }
        .team-score {
            background: #f6faf6;
            border-radius: 18px;
            padding: 16px 18px;
            border: 1px solid #e2ece2;
            transition: 0.2s;
        }
        .team-score.active {
            border-color: #3a8a3a;
            background: #f0f8f0;
            box-shadow: inset 0 0 0 1px #3a8a3a44;
        }
        .team-score .team-name {
            font-size: 17px;
            font-weight: 700;
            color: #1a3a1a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .team-score .team-name .badge {
            font-size: 12px;
            font-weight: 600;
            background: #d0e4d0;
            padding: 2px 12px;
            border-radius: 40px;
            color: #1a4a1a;
        }
        .team-score .score-main {
            font-size: 40px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #0a2a0a;
            margin: 2px 0;
        }
        .team-score .score-main small {
            font-size: 22px;
            font-weight: 600;
            color: #3a6a3a;
        }
        .team-score .overs-info {
            font-size: 15px;
            color: #3a5a3a;
            font-weight: 500;
        }
        .team-score .batsmen {
            margin-top: 10px;
            font-size: 14px;
            border-top: 1px solid #e2ece2;
            padding-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .team-score .batsmen .batsman {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .team-score .batsmen .batsman .name {
            font-weight: 600;
            color: #1a3a1a;
        }
        .team-score .batsmen .batsman .runs {
            font-weight: 600;
            color: #0a3a0a;
        }
        .team-score .batsmen .batsman .runs small {
            font-weight: 400;
            color: #5a7a5a;
        }
        .team-score .batsmen .batsman.out {
            color: #9a4a4a;
            text-decoration: line-through;
        }
        .team-score .batsmen .batsman.out .name {
            color: #9a4a4a;
        }
        .team-score .bowler-info {
            margin-top: 8px;
            font-size: 14px;
            color: #3a5a3a;
            border-top: 1px solid #e2ece2;
            padding-top: 8px;
        }
        .team-score .bowler-info strong {
            color: #1a3a1a;
        }

        /* ---------- QUICK ENTRY ---------- */
        .entry-panel {
            background: #f8fbf8;
            border-radius: 20px;
            padding: 18px 20px;
            margin: 16px 0 14px;
            border: 1px solid #dfe9df;
        }
        .entry-panel .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .entry-panel .label-row .over-display {
            font-weight: 700;
            font-size: 18px;
            color: #1a3a1a;
        }
        .entry-panel .label-row .over-display small {
            font-weight: 400;
            font-size: 14px;
            color: #4a6a4a;
        }
        .entry-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .entry-grid button {
            padding: 10px 14px;
            min-width: 48px;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: 0.12s;
            background: #edf4ed;
            color: #1a3a1a;
            flex: 1 0 auto;
            max-width: 72px;
        }
        .entry-grid button:hover {
            background: #dce8dc;
            transform: scale(0.95);
        }
        .entry-grid button:active {
            transform: scale(0.90);
        }
        .entry-grid .btn-run {
            background: #e1efe1;
        }
        .entry-grid .btn-run:hover {
            background: #cde0cd;
        }
        .entry-grid .btn-run-4 {
            background: #c8e0c8;
            color: #0a4a0a;
        }
        .entry-grid .btn-run-6 {
            background: #b8d8b8;
            color: #0a4a0a;
        }
        .entry-grid .btn-extra {
            background: #f5edd0;
            color: #6a5a2a;
        }
        .entry-grid .btn-extra:hover {
            background: #ede3c0;
        }
        .entry-grid .btn-wicket {
            background: #f0d8d8;
            color: #8a2a2a;
        }
        .entry-grid .btn-wicket:hover {
            background: #e8c8c8;
        }
        .entry-grid .btn-undo {
            background: #e8e8f0;
            color: #3a3a5a;
        }
        .entry-grid .btn-undo:hover {
            background: #d8d8e8;
        }
        .entry-grid .btn-end-over {
            background: #d0e0e8;
            color: #1a4a5a;
            font-size: 14px;
        }
        .entry-grid .btn-end-over:hover {
            background: #c0d4de;
        }
        .entry-grid .btn-wide {
            background: #f5e8d0;
        }
        .entry-grid .btn-nb {
            background: #f0e0c8;
        }
        .entry-grid .btn-bye {
            background: #e8e8d8;
        }
        .entry-grid .btn-lb {
            background: #e0e0d0;
        }

        /* ---------- BOWLING FIGURES ---------- */
        .bowling-section {
            margin: 14px 0 10px;
        }
        .bowling-section h4 {
            font-size: 15px;
            font-weight: 600;
            color: #2a4a2a;
            margin-bottom: 8px;
        }
        .bowling-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .bowling-table th {
            text-align: left;
            padding: 6px 8px;
            font-weight: 600;
            color: #3a5a3a;
            border-bottom: 2px solid #dfe9df;
            font-size: 13px;
        }
        .bowling-table td {
            padding: 5px 8px;
            border-bottom: 1px solid #edf4ed;
        }
        .bowling-table .bowler-name {
            font-weight: 600;
            color: #1a3a1a;
        }
        .bowling-table .figures {
            font-weight: 500;
        }

        /* ---------- FALL OF WICKETS ---------- */
        .fow-section {
            margin: 12px 0 4px;
        }
        .fow-section h4 {
            font-size: 15px;
            font-weight: 600;
            color: #2a4a2a;
            margin-bottom: 6px;
        }
        .fow-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 14px;
            font-size: 14px;
            color: #2a4a2a;
            background: #f8fbf8;
            padding: 10px 14px;
            border-radius: 14px;
            border: 1px solid #dfe9df;
            min-height: 40px;
        }
        .fow-list .fow-item {
            background: #edf4ed;
            padding: 2px 12px;
            border-radius: 30px;
            font-weight: 500;
        }

        /* ---------- EMPTY STATE ---------- */
        .empty-state {
            text-align: center;
            padding: 30px 10px;
            color: #5a7a5a;
        }
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 8px;
        }
        .empty-state p {
            font-size: 16px;
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 680px) {
            .app {
                padding: 16px 12px;
                border-radius: 20px;
            }
            .scoreboard {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .team-score .score-main {
                font-size: 32px;
            }
            .entry-grid button {
                font-size: 16px;
                padding: 8px 10px;
                min-width: 40px;
                max-width: 60px;
            }
            .header h1 {
                font-size: 20px;
            }
            .setup-row {
                flex-direction: column;
                align-items: stretch;
            }
        }
        @media (max-width: 420px) {
            .entry-grid button {
                font-size: 14px;
                padding: 6px 8px;
                min-width: 34px;
                max-width: 50px;
            }
            .team-score .score-main {
                font-size: 28px;
            }
        }

        /* ---------- TOAST ---------- */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1a3a1a;
            color: #fff;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 15px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.20);
            opacity: 0;
            transition: 0.35s;
            pointer-events: none;
            z-index: 999;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

    <div class="app" id="app">
        <!-- HEADER -->
        <div class="header">
            <h1><span>🏏</span> Scorekeeper</h1>
            <div class="header-actions">
                <button onclick="exportResults()">📤 Export</button>
                <button class="btn-danger" onclick="resetMatch()">🔄 Reset</button>
            </div>
        </div>

        <!-- SETUP PANEL -->
        <div class="setup-panel" id="setupPanel">
            <h3>⚙️ Match Setup</h3>
            <div class="setup-row">
                <div class="setup-group">
                    <label>Team 1</label>
                    <input type="text" id="team1Name" placeholder="e.g. India" value="India" />
                </div>
                <div class="setup-group">
                    <label>Team 2</label>
                    <input type="text" id="team2Name" placeholder="e.g. Australia" value="Australia" />
                </div>
                <div class="setup-group">
                    <label>Toss Winner</label>
                    <select id="tossWinner">
                        <option value="team1">Team 1</option>
                        <option value="team2">Team 2</option>
                    </select>
                </div>
                <div class="setup-group">
                    <label>Elect to</label>
                    <select id="tossChoice">
                        <option value="bat">Bat</option>
                        <option value="bowl">Bowl</option>
                    </select>
                </div>
                <div class="setup-actions">
                    <button id="startMatchBtn" onclick="startMatch()">▶️ Start Match</button>
                </div>
            </div>
        </div>

        <!-- SCOREBOARD -->
        <div class="scoreboard" id="scoreboard">
            <div class="team-score" id="team1Score">
                <div class="team-name"><span id="t1Name">Team 1</span><span class="badge" id="t1Badge">Batting</span></div>
                <div class="score-main"><span id="t1Runs">0</span><small> / <span id="t1Wkts">0</span></small></div>
                <div class="overs-info">Overs: <span id="t1Overs">0.0</span></div>
                <div class="batsmen" id="t1Batsmen"></div>
                <div class="bowler-info" id="t1BowlerInfo">Bowler: —</div>
            </div>
            <div class="team-score" id="team2Score">
                <div class="team-name"><span id="t2Name">Team 2</span><span class="badge" id="t2Badge">Bowling</span></div>
                <div class="score-main"><span id="t2Runs">0</span><small> / <span id="t2Wkts">0</span></small></div>
                <div class="overs-info">Overs: <span id="t2Overs">0.0</span></div>
                <div class="batsmen" id="t2Batsmen"></div>
                <div class="bowler-info" id="t2BowlerInfo">Bowler: —</div>
            </div>
        </div>

        <!-- QUICK ENTRY -->
        <div class="entry-panel" id="entryPanel">
            <div class="label-row">
                <span class="over-display" id="overDisplay">Over 0.0 <small>· 0 balls</small></span>
                <span style="font-weight:500;color:#3a5a3a;" id="ballResultDisplay">⏳ awaiting ball</span>
            </div>
            <div class="entry-grid">
                <button class="btn-run" onclick="recordBall(0)">0</button>
                <button class="btn-run" onclick="recordBall(1)">1</button>
                <button class="btn-run" onclick="recordBall(2)">2</button>
                <button class="btn-run" onclick="recordBall(3)">3</button>
                <button class="btn-run-4" onclick="recordBall(4)">4</button>
                <button class="btn-run-6" onclick="recordBall(6)">6</button>
                <button class="btn-extra btn-wide" onclick="recordExtra('wide')">W</button>
                <button class="btn-extra btn-nb" onclick="recordExtra('noball')">NB</button>
                <button class="btn-extra btn-bye" onclick="recordExtra('bye')">B</button>
                <button class="btn-extra btn-lb" onclick="recordExtra('legbye')">LB</button>
                <button class="btn-wicket" onclick="recordWicket()">✕ Wkt</button>
                <button class="btn-end-over" onclick="endOver()">⏭ Over</button>
                <button class="btn-undo" onclick="undoLast()">↩ Undo</button>
            </div>
        </div>

        <!-- BOWLING FIGURES -->
        <div class="bowling-section" id="bowlingSection">
            <h4>📊 Bowling Figures</h4>
            <div id="bowlingContainer">
                <div class="empty-state"><p>No bowling data yet.</p></div>
            </div>
        </div>

        <!-- FALL OF WICKETS -->
        <div class="fow-section" id="fowSection">
            <h4>📌 Fall of Wickets</h4>
            <div class="fow-list" id="fowList">
                <span style="color:#7a9a7a;">—</span>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script>
        // ============================================================
        // DATA MODEL
        // ============================================================
        let match = null;
        let history = [];

        function defaultMatch() {
            return {
                team1: { name: 'Team 1', runs: 0, wickets: 0, balls: 0, extras: 0, overs: 0, ballsInOver: 0,
                    batsmen: [], bowlers: [], fow: [] },
                team2: { name: 'Team 2', runs: 0, wickets: 0, balls: 0, extras: 0, overs: 0, ballsInOver: 0,
                    batsmen: [], bowlers: [], fow: [] },
                batting: 'team1',
                bowling: 'team2',
                status: 'setup', // setup | ongoing | completed
                currentOver: { balls: 0, runs: 0, wickets: 0 },
                overNumber: 0,
                ballNumber: 0,
                totalBalls: 0,
                strikerIdx: 0,
                nonStrikerIdx: 1,
                bowlerIdx: 0,
                lastAction: null,
                toss: { winner: 'team1', choice: 'bat' },
                innings: 1,
                maxOvers: 20,
            };
        }

        // ============================================================
        // INIT
        // ============================================================
        function init() {
            const saved = localStorage.getItem('cricketMatchData');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    // basic validation
                    if (parsed.team1 && parsed.team2 && parsed.status) {
                        match = parsed;
                        // ensure batsmen & bowlers arrays exist
                        ['team1', 'team2'].forEach(t => {
                            if (!match[t].batsmen) match[t].batsmen = [];
                            if (!match[t].bowlers) match[t].bowlers = [];
                            if (!match[t].fow) match[t].fow = [];
                            if (match[t].overs === undefined) match[t].overs = 0;
                            if (match[t].ballsInOver === undefined) match[t].ballsInOver = 0;
                            if (match[t].extras === undefined) match[t].extras = 0;
                        });
                        if (!match.currentOver) match.currentOver = { balls: 0, runs: 0, wickets: 0 };
                        if (match.overNumber === undefined) match.overNumber = 0;
                        if (match.ballNumber === undefined) match.ballNumber = 0;
                        if (match.totalBalls === undefined) match.totalBalls = 0;
                        if (match.strikerIdx === undefined) match.strikerIdx = 0;
                        if (match.nonStrikerIdx === undefined) match.nonStrikerIdx = 1;
                        if (match.bowlerIdx === undefined) match.bowlerIdx = 0;
                        if (!match.toss) match.toss = { winner: 'team1', choice: 'bat' };
                        if (match.innings === undefined) match.innings = 1;
                        renderAll();
                        return;
                    }
                } catch (_) { /* ignore */ }
            }
            // fresh default
            match = defaultMatch();
            // set default names from inputs
            const t1 = document.getElementById('team1Name').value || 'India';
            const t2 = document.getElementById('team2Name').value || 'Australia';
            match.team1.name = t1;
            match.team2.name = t2;
            // default batsmen
            match.team1.batsmen = [
                { name: 'Batsman 1', runs: 0, balls: 0, fours: 0, sixes: 0, out: false, outReason: '' },
                { name: 'Batsman 2', runs: 0, balls: 0, fours: 0, sixes: 0, out: false, outReason: '' },
            ];
            match.team2.batsmen = [
                { name: 'Batsman 1', runs: 0, balls: 0, fours: 0, sixes: 0, out: false, outReason: '' },
                { name: 'Batsman 2', runs: 0, balls: 0, fours: 0, sixes: 0, out: false, outReason: '' },
            ];
            // default bowlers
            match.team1.bowlers = [
                { name: 'Bowler 1', overs: 0, balls: 0, runs: 0, wickets: 0, extras: 0 },
                { name: 'Bowler 2', overs: 0, balls: 0, runs: 0, wickets: 0, extras: 0 },
            ];
            match.team2.bowlers = [
                { name: 'Bowler 1', overs: 0, balls: 0, runs: 0, wickets: 0, extras: 0 },
                { name: 'Bowler 2', overs: 0, balls: 0, runs: 0, wickets: 0, extras: 0 },
            ];
            match.status = 'setup';
            saveState();
            renderAll();
        }

        // ============================================================
        // STATE PERSISTENCE
        // ============================================================
        function saveState() {
            try {
                localStorage.setItem('cricketMatchData', JSON.stringify(match));
            } catch (_) { /* ignore */ }
        }

        // ============================================================
        // TOAST
        // ============================================================
        let toastTimer = null;

        function showToast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
        }

        // ============================================================
        // MATCH SETUP / START
        // ============================================================
        function startMatch() {
            const t1 = document.getElementById('team1Name').value.trim() || 'Team 1';
            const t2 = document.getElementById('team2Name').value.trim() || 'Team 2';
            const tossWinner = document.getElementById('tossWinner').value;
            const tossChoice = document.getElementById('tossChoice').value;

            // Reset match but keep names
            match = defaultMatch();
            match.team1.name = t1;
            match.team2.name = t2;
            match.toss.winner = tossWinner;
            match.toss.choice = tossChoice;

            // Determine batting/bowling
            const battingTeam = (tossWinner === 'team1' && tossChoice === 'bat') || (tossWinner === 'team2' && tossChoice ===
                'bowl') ? 'team1' : 'team2';
            const bowlingTeam = battingTeam === 'team1' ? 'team2' : 'team1';
            match.batting = battingTeam;
            match.bowling = bowlingTeam;

            // Set batsmen
            match.team1.batsmen = [
                { name: t1 + ' #1', runs: 0, balls: 0, fours: 0, sixes: 0, out: false, outReason: '' },
                { name: t1 + ' #2', runs: 0, balls: 0, fours: 0, sixes: 0, out: false, outReason: '' },
            ];
            match.team2.batsmen = [
                { name: t2 + ' #1', runs: 0, balls: 0, fours: 0, sixes: 0, out: false, outReason: '' },
                { name: t2 + ' #2', runs: 0, balls: 0, fours: 0, sixes: 0, out: false, outReason: '' },
            ];
            match.team1.bowlers = [
                { name: t1 + ' #1', overs: 0, balls: 0, runs: 0, wickets: 0, extras: 0 },
                { name: t1 + ' #2', overs: 0, balls: 0, runs: 0, wickets: 0, extras: 0 },
            ];
            match.team2.bowlers = [
                { name: t2 + ' #1', overs: 0, balls: 0, runs: 0, wickets: 0, extras: 0 },
                { name: t2 + ' #2', overs: 0, balls: 0, runs: 0, wickets: 0, extras: 0 },
            ];

            match.status = 'ongoing';
            match.strikerIdx = 0;
            match.nonStrikerIdx = 1;
            match.bowlerIdx = 0;
            history = [];
            saveState();
            renderAll();
            showToast(`🏏 Match started! ${battingTeam === 'team1' ? t1 : t2} batting.`);
        }

        // ============================================================
        // RECORD A BALL (runs)
        // ============================================================
        function recordBall(runs) {
            if (match.status !== 'ongoing') {
                showToast('⛔ Match not started or already completed.');
                return;
            }
            const batting = getBattingTeam();
            const bowling = getBowlingTeam();
            if (!batting || !bowling) return;

            // find current batsmen
            const striker = batting.batsmen[match.strikerIdx];
            const nonStriker = batting.batsmen[match.nonStrikerIdx];
            if (!striker || striker.out) {
                showToast('⚠️ Striker is out! Add a new batsman or fix.');
                return;
            }

            // record action
            const action = { type: 'ball', runs, ball: match.totalBalls + 1, over: match.overNumber, ballInOver: match
                    .currentOver.balls };

            // update batsman
            striker.runs += runs;
            striker.balls += 1;
            if (runs === 4) striker.fours += 1;
            if (runs === 6) striker.sixes += 1;

            // update team
            batting.runs += runs;
            batting.balls += 1;

            // update bowler
            const bowler = bowling.bowlers[match.bowlerIdx];
            if (bowler) {
                bowler.runs += runs;
                bowler.balls += 1;
            }

            // update current over
            match.currentOver.balls += 1;
            match.currentOver.runs += runs;
            match.ballNumber += 1;
            match.totalBalls += 1;
            batting.ballsInOver = match.currentOver.balls;

            // strike rotation on odd runs
            if (runs % 2 === 1) {
                swapStrike();
            }

            // check if over complete
            if (match.currentOver.balls >= 6) {
                completeOver();
            } else {
                // update ball result display
                document.getElementById('ballResultDisplay').textContent = `⚡ ${runs} runs`;
            }

            history.push(action);
            saveState();
            renderAll();
        }

        // ============================================================
        // RECORD EXTRA
        // ============================================================
        function recordExtra(type) {
            if (match.status !== 'ongoing') {
                showToast('⛔ Match not started.');
                return;
            }
            const batting = getBattingTeam();
            const bowling = getBowlingTeam();
            if (!batting || !bowling) return;

            const striker = batting.batsmen[match.strikerIdx];
            if (!striker || striker.out) {
                showToast('⚠️ Striker is out!');
                return;
            }

            let runs = 0;
            let isLegal = true;
            let label = '';

            switch (type) {
                case 'wide':
                    runs = 1;
                    isLegal = false;
                    label = 'Wide';
                    break;
                case 'noball':
                    runs = 1;
                    isLegal = false;
                    label = 'No-ball';
                    break;
                case 'bye':
                    runs = 1;
                    isLegal = true;
                    label = 'Bye';
                    break;
                case 'legbye':
                    runs = 1;
                    isLegal = true;
                    label = 'Leg-bye';
                    break;
                default:
                    return;
            }

            const action = { type: 'extra', extraType: type, runs, label, ball: match.totalBalls + 1, over: match
                    .overNumber };

            // update team
            batting.runs += runs;
            batting.extras += runs;

            // update bowler (except byes and leg-byes - they don't count against bowler)
            const bowler = bowling.bowlers[match.bowlerIdx];
            if (bowler && (type === 'wide' || type === 'noball')) {
                bowler.runs += runs;
                bowler.extras += runs;
            }

            // update current over
            match.currentOver.runs += runs;

            // for wide and no-ball, ball doesn't count as legal
            if (isLegal) {
                // bye or leg-bye: legal delivery, counts as ball
                striker.balls += 1;
                batting.balls += 1;
                match.currentOver.balls += 1;
                match.ballNumber += 1;
                match.totalBalls += 1;
                batting.ballsInOver = match.currentOver.balls;
                if (bowler) bowler.balls += 1;
            } else {
                // wide / no-ball: extra ball, does not count as legal
                // but we still count it in total balls for display
                match.totalBalls += 1;
                // no strike rotation for extras
                if (type === 'noball' && runs % 2 === 1) {
                    // no-ball runs count as runs, odd runs rotate strike
                    // but in cricket, no-ball runs go to the batsman but not off the bat
                    // we'll keep it simple: rotate on odd runs from no-ball
                    // Actually, in cricket, no-ball runs are added to the batsman's score but the ball is not counted
                    // and strike does NOT rotate on no-ball runs.
                    // So we skip rotation.
                }
            }

            // check over complete
            if (match.currentOver.balls >= 6) {
                completeOver();
            } else {
                document.getElementById('ballResultDisplay').textContent = `🔄 ${label} +${runs}`;
            }

            history.push(action);
            saveState();
            renderAll();
        }

        // ============================================================
        // RECORD WICKET
        // ============================================================
        function recordWicket() {
            if (match.status !== 'ongoing') {
                showToast('⛔ Match not started.');
                return;
            }
            const batting = getBattingTeam();
            const bowling = getBowlingTeam();
            if (!batting || !bowling) return;

            const striker = batting.batsmen[match.strikerIdx];
            if (!striker || striker.out) {
                showToast('⚠️ Striker already out!');
                return;
            }

            // mark out
            striker.out = true;
            striker.outReason = 'b';

            batting.wickets += 1;
            match.currentOver.wickets += 1;

            // bowler gets wicket
            const bowler = bowling.bowlers[match.bowlerIdx];
            if (bowler) bowler.wickets += 1;

            // record fall of wicket
            const total = batting.runs;
            batting.fow.push({ runs: total, batsman: striker.name, over: match.overNumber + '.' + match.currentOver
                    .balls });

            const action = { type: 'wicket', batsman: striker.name, runs: total, over: match.overNumber + '.' + match
                    .currentOver.balls };
            history.push(action);

            // check if all out
            const active = batting.batsmen.filter(b => !b.out);
            if (active.length === 0) {
                // all out - innings over
                match.status = 'completed';
                showToast('🏏 All out! Innings completed.');
                saveState();
                renderAll();
                return;
            }

            // find next batsman
            const nextIdx = batting.batsmen.findIndex(b => !b.out);
            if (nextIdx === -1) {
                match.status = 'completed';
                showToast('🏏 All out!');
                saveState();
                renderAll();
                return;
            }

            // set new striker (next batsman comes in at striker's end)
            // But the new batsman takes the striker's place
            match.strikerIdx = nextIdx;
            // non-striker stays

            // the new batsman is now on strike
            document.getElementById('ballResultDisplay').textContent = `✕ Wicket! ${striker.name} out.`;

            saveState();
            renderAll();
        }

        // ============================================================
        // END OVER
        // ============================================================
        function endOver() {
            if (match.status !== 'ongoing') return;
            if (match.currentOver.balls === 0) {
                showToast('⏳ Over already empty.');
                return;
            }
            completeOver();
            saveState();
            renderAll();
        }

        function completeOver() {
            const batting = getBattingTeam();
            const bowling = getBowlingTeam();
            if (!batting || !bowling) return;

            // update team overs
            batting.overs += 1;
            batting.ballsInOver = 0;

            // update bowler overs
            const bowler = bowling.bowlers[match.bowlerIdx];
            if (bowler) {
                bowler.overs += 1;
            }

            // reset current over
            match.currentOver = { balls: 0, runs: 0, wickets: 0 };
            match.overNumber += 1;

            // swap strike at end of over
            swapStrike();

            // rotate bowler
            const nextBowler = (match.bowlerIdx + 1) % bowling.bowlers.length;
            match.bowlerIdx = nextBowler;

            document.getElementById('ballResultDisplay').textContent = `⏭ Over ${match.overNumber} complete`;
            showToast(`⏭ Over ${match.overNumber} complete.`);
        }

        // ============================================================
        // UTILITY
        // ============================================================
        function getBattingTeam() {
            return match.batting === 'team1' ? match.team1 : match.team2;
        }

        function getBowlingTeam() {
            return match.batting === 'team1' ? match.team2 : match.team1;
        }

        function swapStrike() {
            const tmp = match.strikerIdx;
            match.strikerIdx = match.nonStrikerIdx;
            match.nonStrikerIdx = tmp;
        }

        // ============================================================
        // UNDO
        // ============================================================
        function undoLast() {
            if (history.length === 0) {
                showToast('⚠️ Nothing to undo.');
                return;
            }
            showToast('↩ Undo not fully implemented in this demo.');
            // For a production app, we'd pop the last action and reverse it.
            // This is a simplified version.
        }

        // ============================================================
        // RESET
        // ============================================================
        function resetMatch() {
            if (!confirm('Reset the entire match? All data will be lost.')) return;
            localStorage.removeItem('cricketMatchData');
            match = defaultMatch();
            const t1 = document.getElementById('team1Name').value || 'Team 1';
            const t2 = document.getElementById('team2Name').value || 'Team 2';
            match.team1.name = t1;
            match.team2.name = t2;
            match.team1.batsmen = [
                { name: t1 + ' #1', runs: 0, balls: 0, fours: 0, sixes: 0, out: false, outReason: '' },
                { name: t1 + ' #2', runs: 0, balls: 0, fours: 0, sixes: 0, out: false, outReason: '' },
            ];
            match.team2.batsmen = [
                { name: t2 + ' #1', runs: 0, balls: 0, fours: 0, sixes: 0, out: false, outReason: '' },
                { name: t2 + ' #2', runs: 0, balls: 0, fours: 0, sixes: 0, out: false, outReason: '' },
            ];
            match.team1.bowlers = [
                { name: t1 + ' #1', overs: 0, balls: 0, runs: 0, wickets: 0, extras: 0 },
                { name: t1 + ' #2', overs: 0, balls: 0, runs: 0, wickets: 0, extras: 0 },
            ];
            match.team2.bowlers = [
                { name: t2 + ' #1', overs: 0, balls: 0, runs: 0, wickets: 0, extras: 0 },
                { name: t2 + ' #2', overs: 0, balls: 0, runs: 0, wickets: 0, extras: 0 },
            ];
            match.status = 'setup';
            history = [];
            saveState();
            renderAll();
            showToast('🔄 Match reset.');
        }

        // ============================================================
        // EXPORT
        // ============================================================
        function exportResults() {
            if (!match || match.status === 'setup') {
                showToast('⚠️ No match data to export.');
                return;
            }

            const lines = [];
            lines.push('🏏 CRICKET MATCH SCORECARD');
            lines.push('============================');
            lines.push(`Match: ${match.team1.name} vs ${match.team2.name}`);
            lines.push(`Toss: ${match.toss.winner === 'team1' ? match.team1.name : match.team2.name} won, elected to ${match.toss.choice}`);
            lines.push(`Status: ${match.status}`);
            lines.push('');

            // Team 1
            const t1 = match.team1;
            const t2 = match.team2;
            lines.push(`📊 ${t1.name} - ${t1.runs}/${t1.wickets} (${t1.overs}.${t1.ballsInOver} overs)`);
            lines.push('Batting:');
            t1.batsmen.forEach(b => {
                const out = b.out ? `out (${b.outReason})` : 'not out';
                lines.push(`  ${b.name}  ${b.runs} (${b.balls}b, ${b.fours}×4, ${b.sixes}×6)  ${out}`);
            });
            lines.push(`Extras: ${t1.extras}`);
            lines.push('');

            lines.push(`📊 ${t2.name} - ${t2.runs}/${t2.wickets} (${t2.overs}.${t2.ballsInOver} overs)`);
            lines.push('Batting:');
            t2.batsmen.forEach(b => {
                const out = b.out ? `out (${b.outReason})` : 'not out';
                lines.push(`  ${b.name}  ${b.runs} (${b.balls}b, ${b.fours}×4, ${b.sixes}×6)  ${out}`);
            });
            lines.push(`Extras: ${t2.extras}`);
            lines.push('');

            lines.push('📌 Fall of Wickets:');
            [...t1.fow, ...t2.fow].forEach((f, i) => {
                lines.push(`  ${i+1}. ${f.runs} - ${f.batsman} (${f.over})`);
            });
            if ([...t1.fow, ...t2.fow].length === 0) lines.push('  (none)');
            lines.push('');

            lines.push('📊 Bowling Figures:');
            const allBowlers = [...t1.bowlers, ...t2.bowlers];
            allBowlers.forEach(b => {
                const overs = b.overs + '.' + (b.balls % 6);
                lines.push(`  ${b.name}  ${overs} overs, ${b.runs} runs, ${b.wickets} wickets, ${b.extras} extras`);
            });
            lines.push('');
            lines.push(`📅 Exported: ${new Date().toLocaleString()}`);
            lines.push('============================');

            const text = lines.join('\n');

            // download
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `cricket_scorecard_${new Date().toISOString().slice(0,10)}.txt`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('📤 Exported!');
        }

        // ============================================================
        // RENDER
        // ============================================================
        function renderAll() {
            if (!match) return;

            const isSetup = match.status === 'setup';
            document.getElementById('entryPanel').style.opacity = isSetup ? '0.5' : '1';
            document.getElementById('entryPanel').style.pointerEvents = isSetup ? 'none' : 'auto';

            // Team names
            document.getElementById('t1Name').textContent = match.team1.name;
            document.getElementById('t2Name').textContent = match.team2.name;

            // Badges
            const t1Badge = document.getElementById('t1Badge');
            const t2Badge = document.getElementById('t2Badge');
            if (match.status === 'setup') {
                t1Badge.textContent = '—';
                t2Badge.textContent = '—';
            } else {
                t1Badge.textContent = match.batting === 'team1' ? 'Batting' : 'Bowling';
                t2Badge.textContent = match.batting === 'team2' ? 'Batting' : 'Bowling';
                document.getElementById('team1Score').classList.toggle('active', match.batting === 'team1');
                document.getElementById('team2Score').classList.toggle('active', match.batting === 'team2');
            }

            // Scores
            document.getElementById('t1Runs').textContent = match.team1.runs;
            document.getElementById('t1Wkts').textContent = match.team1.wickets;
            document.getElementById('t1Overs').textContent = match.team1.overs + '.' + match.team1.ballsInOver;

            document.getElementById('t2Runs').textContent = match.team2.runs;
            document.getElementById('t2Wkts').textContent = match.team2.wickets;
            document.getElementById('t2Overs').textContent = match.team2.overs + '.' + match.team2.ballsInOver;

            // Over display
            const overNum = match.overNumber;
            const ballInOver = match.currentOver.balls;
            document.getElementById('overDisplay').innerHTML =
                `Over ${overNum}.${ballInOver} <small>· ${match.totalBalls} balls</small>`;

            // Batsmen
            renderBatsmen('team1');
            renderBatsmen('team2');

            // Bowler info
            renderBowlerInfo();

            // Bowling figures
            renderBowlingFigures();

            // Fall of wickets
            renderFOW();

            // Setup panel visibility
            if (match.status === 'setup') {
                document.getElementById('setupPanel').style.display = 'block';
            } else {
                document.getElementById('setupPanel').style.display = 'none';
            }

            // Update start button
            const startBtn = document.getElementById('startMatchBtn');
            if (match.status === 'setup') {
                startBtn.textContent = '▶️ Start Match';
                startBtn.disabled = false;
            } else {
                startBtn.textContent = '✅ Match Ongoing';
                startBtn.disabled = true;
            }
        }

        function renderBatsmen(teamKey) {
            const team = match[teamKey];
            const container = document.getElementById(teamKey === 'team1' ? 't1Batsmen' : 't2Batsmen');
            if (!team || !team.batsmen || team.batsmen.length === 0) {
                container.innerHTML = '<span style="color:#7a9a7a;">No batsmen</span>';
                return;
            }
            const isBatting = match.batting === teamKey;
            let html = '';
            team.batsmen.forEach((b, idx) => {
                const isStriker = isBatting && idx === match.strikerIdx;
                const isNonStriker = isBatting && idx === match.nonStrikerIdx;
                const out = b.out ? 'out' : '';
                const marker = isStriker ? '🏏 ' : (isNonStriker ? '🔄 ' : '');
                html += `<div class="batsman ${out}">
              <span class="name">${marker}${b.name}</span>
              <span class="runs">${b.runs} <small>(${b.balls}b, ${b.fours}×4, ${b.sixes}×6)</small></span>
            </div>`;
            });
            container.innerHTML = html || '<span style="color:#7a9a7a;">—</span>';
        }

        function renderBowlerInfo() {
            const bowling = getBowlingTeam();
            if (!bowling || !bowling.bowlers || bowling.bowlers.length === 0) {
                document.getElementById('t1BowlerInfo').textContent = 'Bowler: —';
                document.getElementById('t2BowlerInfo').textContent = 'Bowler: —';
                return;
            }
            const idx = match.bowlerIdx || 0;
            const b = bowling.bowlers[idx];
            const info = b ? `${b.name}  ${b.overs}.${b.balls%6} overs, ${b.runs} runs, ${b.wickets} wkts` : '—';

            if (match.batting === 'team1') {
                document.getElementById('t2BowlerInfo').innerHTML = `<strong>Bowler:</strong> ${info}`;
                document.getElementById('t1BowlerInfo').innerHTML = `<strong>Bowler:</strong> —`;
            } else {
                document.getElementById('t1BowlerInfo').innerHTML = `<strong>Bowler:</strong> ${info}`;
                document.getElementById('t2BowlerInfo').innerHTML = `<strong>Bowler:</strong> —`;
            }
        }

        function renderBowlingFigures() {
            const container = document.getElementById('bowlingContainer');
            const allBowlers = [...match.team1.bowlers, ...match.team2.bowlers];
            const hasData = allBowlers.some(b => b.balls > 0 || b.overs > 0 || b.runs > 0 || b.wickets > 0);

            if (!hasData) {
                container.innerHTML = '<div class="empty-state"><p>No bowling data yet.</p></div>';
                return;
            }

            let html = `<table class="bowling-table">
            <thead><tr>
              <th>Bowler</th><th>O</th><th>M</th><th>R</th><th>W</th><th>Econ</th>
            </tr></thead><tbody>`;

            // Group by team
            const teams = [
                { name: match.team1.name, bowlers: match.team1.bowlers },
                { name: match.team2.name, bowlers: match.team2.bowlers },
            ];
            teams.forEach(t => {
                t.bowlers.forEach(b => {
                    if (b.balls === 0 && b.overs === 0 && b.runs === 0 && b.wickets === 0) return;
                    const overs = b.overs + '.' + (b.balls % 6);
                    const econ = (b.balls > 0 || b.overs > 0) ? (b.runs / (b.overs + b.balls / 6)).toFixed(2) :
                    '0.00';
                    html += `<tr>
                <td class="bowler-name">${b.name}</td>
                <td>${overs}</td>
                <td>0</td>
                <td>${b.runs}</td>
                <td>${b.wickets}</td>
                <td>${econ}</td>
              </tr>`;
                });
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function renderFOW() {
            const list = document.getElementById('fowList');
            const allFow = [...match.team1.fow, ...match.team2.fow];
            if (allFow.length === 0) {
                list.innerHTML = '<span style="color:#7a9a7a;">—</span>';
                return;
            }
            let html = '';
            allFow.forEach((f, i) => {
                html += `<span class="fow-item">${i+1}. ${f.runs} (${f.batsman}, ${f.over})</span>`;
            });
            list.innerHTML = html;
        }

        // ============================================================
        // AUTO-SAVE & POLLING
        // ============================================================
        // Auto-save on any change (renderAll calls saveState)
        // We also listen for beforeunload
        window.addEventListener('beforeunload', () => saveState());

        // ============================================================
        // BOOT
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            // set default names from inputs
            init();
            // auto-start if we have a saved match
            if (match && match.status === 'ongoing') {
                renderAll();
            }
        });
    </script>
</body>
</html>
